<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Bank Iwan Security System</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #0f0;
            text-align: center;
            padding-top: 50px;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>🏦 Iwan Bank Security System</h1>

<p>Wprowadź dane aby uzyskać dostęp do... (teoretycznie) karty kredytowej 💳</p>

<input type="text" id="login" placeholder="Login"><br>
<input type="password" id="password" placeholder="Hasło"><br>
<input type="number" id="age" placeholder="Wiek"><br>

<button onclick="checkAccess()">Zaloguj</button>

<div id="result"></div>

<script>
function checkAccess() {
    let nazwa_loginu = "Iwan";
    let haslo = "Iwan";

    let podany_login = document.getElementById("login").value;
    let podane_haslo = document.getElementById("password").value;
    let wiek = parseInt(document.getElementById("age").value);

    let dorosly = wiek >= 21;
    let haslo_poprawne = podane_haslo === haslo;
    let login_poprawny = podany_login === nazwa_loginu;

    let result = document.getElementById("result");

    if (!dorosly) {
        result.innerHTML = "🚫 Konto zablokowane (za młody)";
    } 
    else if (haslo_poprawne && login_poprawny && dorosly) {
        result.innerHTML = "💳 Dostęp do karty kredytowej przyznany - brak środków 😂";
    } 
    else {
        result.innerHTML = "❌ Brak dostępu";
    }
}
</script>

</body>
</html>
